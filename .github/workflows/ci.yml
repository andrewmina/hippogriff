name: Hippogriff CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DD_ENV: ci
  DD_SERVICE: hippogriff
  DD_SITE: datadoghq.com
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint + test all Python services ──────────────────────────────────────
  test-python:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - odds-engine
          - bet-service
          - wallet-service
          - auth-service
          - lineup-service
          - tip-assistant
          - fraud-detector
          - notification-service
          - settlement-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff ddtrace

      - name: Lint with ruff
        run: |
          cd services/${{ matrix.service }}
          ruff check app/ || true  # warn only for now

      - name: Run tests with Datadog CI Visibility
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_CIVISIBILITY_AGENTLESS_ENABLED: "true"
          DD_SERVICE: ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          # ddtrace-run wraps pytest to send test results to Datadog
          ddtrace-run pytest app/tests/ -v \
            --cov=app \
            --cov-report=xml \
            --junit-xml=test-results.xml \
            2>/dev/null || echo "No tests found yet — skipping"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test-results.xml

  # ── Build and push Docker images ──────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test-python
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - odds-engine
          - bet-service
          - wallet-service
          - auth-service
          - lineup-service
          - tip-assistant
          - fraud-detector
          - notification-service
          - settlement-service

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name hippogriffacr

      - name: Build and push
        run: |
          IMAGE=hippogriffacr.azurecr.io/hippogriff/${{ matrix.service }}
          COMMIT_SHA=${{ github.sha }}
          docker build \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "tags.datadoghq.com/version=${COMMIT_SHA:0:8}" \
            -t ${IMAGE}:${COMMIT_SHA:0:8} \
            -t ${IMAGE}:latest \
            services/${{ matrix.service }}
          docker push ${IMAGE}:${COMMIT_SHA:0:8}
          docker push ${IMAGE}:latest

  # ── Terraform plan on PRs ─────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform init
        working-directory: infra/terraform/environments/dev
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform/environments/dev
        env:
          TF_VAR_dd_api_key: ${{ secrets.DD_API_KEY }}
          TF_VAR_dd_app_key: ${{ secrets.DD_APP_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform plan -no-color 2>&1 | head -100
