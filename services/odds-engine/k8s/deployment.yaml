apiVersion: apps/v1
kind: Deployment
metadata:
  name: odds-engine
  namespace: hippogriff
  labels:
    app: odds-engine
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: odds-engine
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odds-engine
  template:
    metadata:
      labels:
        app: odds-engine
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: odds-engine
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        admission.datadoghq.com/python-lib.version: "v2"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      containers:
        - name: odds-engine
          image: hippogriffacrdev.azurecr.io/hippogriff/odds-engine:latest
          ports:
            - containerPort: 8000
          env:
            - name: DD_ENV
              value: "hippogriff-agent.datadog.svc.cluster.local"
          - name: DD_AGENT_HOST_REPLACED
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              value: "hippogriff-agent.datadog.svc.cluster.local"
          - name: DD_AGENT_HOST_REPLACED
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              value: "hippogriff-agent.datadog.svc.cluster.local"
          - name: DD_AGENT_HOST_REPLACED
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
            - name: DD_AGENT_HOST
              value: "hippogriff-agent.datadog.svc.cluster.local"
          - name: DD_AGENT_HOST_REPLACED
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_DOGSTATSD_PORT
              value: "8125"
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_TRACE_SAMPLE_RATE
              value: "1.0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: odds-engine
  namespace: hippogriff
  labels:
    app: odds-engine
spec:
  selector:
    app: odds-engine
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
