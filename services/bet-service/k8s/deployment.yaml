apiVersion: apps/v1
kind: Deployment
metadata:
  name: bet-service
  namespace: hippogriff
  labels:
    app: bet-service
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: bet-service
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bet-service
  template:
    metadata:
      labels:
        app: bet-service
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: bet-service
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        admission.datadoghq.com/python-lib.version: "v2"
    spec:
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      containers:
        - name: bet-service
          image: hippogriffacrdev.azurecr.io/hippogriff/bet-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_DOGSTATSD_PORT
              value: "8125"
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_APPSEC_ENABLED
              value: "true"
            - name: DD_DBM_PROPAGATION_MODE
              value: "full"
            - name: DD_TRACE_SAMPLE_RATE
              value: "1.0"
            - name: ODDS_ENGINE_URL
              value: "http://odds-engine.hippogriff.svc.cluster.local:8000"
            - name: FRAUD_SERVICE_URL
              value: "http://fraud-detector.hippogriff.svc.cluster.local:8000"
            - name: DATABASE_URL
              value: "postgresql://hippogriff:hippogriff@postgres.hippogriff.svc.cluster.local:5432/hippogriff"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bet-service
  namespace: hippogriff
  labels:
    app: bet-service
spec:
  selector:
    app: bet-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
